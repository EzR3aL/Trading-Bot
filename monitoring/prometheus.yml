global:
  scrape_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - "/etc/prometheus/alert_rules.yml"

scrape_configs:
  - job_name: "trading-bot"
    static_configs:
      - targets: ["trading-bot:8000"]
    metrics_path: /metrics
