[alembic]
script_location = migrations
# Prepend the repo root to sys.path so migrations/env.py can import src.*
# (required for alembic CLI; FastAPI app startup already has src on the path)
prepend_sys_path = .
# URL overridden by env.py at runtime from DATABASE_URL env var
sqlalchemy.url = sqlite+aiosqlite:///data/bot.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
