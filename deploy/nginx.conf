# Edge Bots by Trading Department — Nginx Reverse Proxy
#
# Setup:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/edgebots
#   sudo ln -sf /etc/nginx/sites-available/edgebots /etc/nginx/sites-enabled/edgebots
#   sudo nginx -t && sudo systemctl reload nginx
#
# SSL (run after DNS is active):
#   sudo certbot --nginx -d bots.trading-department.com
#
# Rate limiting zone (must be in http block of /etc/nginx/nginx.conf):
#   limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

# ── Primary: bots.trading-department.com (HTTP → Certbot adds SSL) ────

server {
    listen 80;
    server_name bots.trading-department.com;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 300s;
    }

    # Rate limiting for auth endpoints
    location /api/auth/login {
        limit_req zone=login burst=5 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/bridge {
        limit_req zone=login burst=10 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Deny access to monitoring endpoints from outside
    location /api/metrics {
        deny all;
        return 403;
    }
}

# ── Legacy fallback: duckdns.org (kept until migration complete) ──────
# NOTE: This block is managed by Certbot on the VPS and should not
# be overwritten. It lives in /etc/nginx/sites-enabled/trading-bot.
# The server handles both configs side by side.
