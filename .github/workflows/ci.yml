name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - run: pip install pytest pytest-asyncio pytest-mock pytest-timeout

      - run: python -m pytest tests/ -q --timeout=120
        env:
          CI: true
          ENVIRONMENT: test
          JWT_SECRET_KEY: test-secret-key-for-ci-only-not-production
          DATABASE_URL: sqlite+aiosqlite:///test.db

  frontend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --legacy-peer-deps

      - run: npx vitest run

      - run: npx vite build

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install ruff

      - run: ruff check src/ tests/ --select E,W,F --ignore E501
