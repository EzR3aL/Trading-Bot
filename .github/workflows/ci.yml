name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_trading_bot
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - run: pip install pytest pytest-asyncio pytest-mock pytest-timeout

      - name: Run tests with SQLite
        run: python -m pytest tests/ -q --timeout=120
        env:
          CI: true
          ENVIRONMENT: test
          JWT_SECRET_KEY: test-secret-key-for-ci-only-not-production
          ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS1mb3ItdGVzdGluZw==
          DATABASE_URL: sqlite+aiosqlite:///test.db

      - name: Raise PostgreSQL max_connections to 500
        # GitHub Actions `services.postgres.options` cannot pass `-c` server
        # flags (those are CMD args, not docker-create flags — see the
        # `fec45a6` revert). Instead, exec into the running container, append
        # `max_connections = 500` to postgresql.conf, and restart it. Needed
        # because the default `max_connections=100` is exhausted by function-
        # scoped engines under pytest-asyncio 1.x auto mode (#354).
        run: |
          set -euo pipefail
          CONTAINER=$(docker ps --filter ancestor=postgres:16-alpine --format '{{.ID}}' | head -n1)
          test -n "$CONTAINER"
          docker exec "$CONTAINER" bash -c "echo 'max_connections = 500' >> /var/lib/postgresql/data/postgresql.conf"
          docker restart "$CONTAINER"
          for i in {1..30}; do
            if docker exec "$CONTAINER" pg_isready -U test_user -d test_trading_bot >/dev/null 2>&1; then
              echo "PostgreSQL is ready"
              break
            fi
            sleep 2
          done
          docker exec "$CONTAINER" psql -U test_user -d test_trading_bot -c "SHOW max_connections;"

      - name: Run integration tests with PostgreSQL
        # Scoped to tests/integration/ — unit tests run against SQLite above
        # (authoritative). Integration tests validate real PG behaviour
        # (queries, migrations, JSONB, etc.). Scoping this step cuts the PG
        # connection load by ~10x vs. running the full suite, which was the
        # root cause of #354 pool exhaustion.
        timeout-minutes: 10
        run: python -m pytest tests/integration/ -q --timeout=120
        env:
          CI: true
          ENVIRONMENT: test
          TEST_DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_trading_bot
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_trading_bot
          JWT_SECRET_KEY: test-secret-key-for-ci-only-not-for-production
          ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS1mb3ItdGVzdGluZw==
          DB_POOL_SIZE: 2
          DB_MAX_OVERFLOW: 3

  frontend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --legacy-peer-deps

      - run: npx vitest run

      - run: npx vite build

  # Playwright smoke E2E (#335). Non-blocking until the flows stabilise —
  # `continue-on-error: true` means a failure here will surface in the
  # checks tab but won't block a merge. Flip that to `false` once the
  # suite has been green for ~2 weeks.
  #
  # Required GitHub Secrets for the full flow to run (optional — all
  # credential-driven tests self-skip if absent):
  #   - E2E_USER  — username of a disposable test account
  #   - E2E_PASS  — password for that account
  #   - E2E_HAS_OPEN_TRADE — set to "1" when the test account currently
  #     has an open position (manual-close flow)
  frontend-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          CI: true
          E2E_USER: ${{ secrets.E2E_USER }}
          E2E_PASS: ${{ secrets.E2E_PASS }}
          E2E_HAS_OPEN_TRADE: ${{ secrets.E2E_HAS_OPEN_TRADE }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install ruff

      - run: ruff check src/ tests/ --select E,W,F --ignore E501,E402,E731

  # ARCH-C4: verify every migration has a working upgrade() AND downgrade()
  # by running upgrade head -> downgrade base -> upgrade head against a real
  # Postgres 16. Catches missing/broken downgrade() before it hits production.
  alembic-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: tradingbot_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: alembic upgrade head
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://ci:ci@localhost:5432/tradingbot_ci
          ENVIRONMENT: test
          JWT_SECRET_KEY: test-secret-key-for-ci-only-not-production
          ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS1mb3ItdGVzdGluZw==

      - name: alembic downgrade base
        run: alembic downgrade base
        env:
          DATABASE_URL: postgresql+asyncpg://ci:ci@localhost:5432/tradingbot_ci
          ENVIRONMENT: test
          JWT_SECRET_KEY: test-secret-key-for-ci-only-not-production
          ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS1mb3ItdGVzdGluZw==

      - name: alembic upgrade head (re-apply)
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://ci:ci@localhost:5432/tradingbot_ci
          ENVIRONMENT: test
          JWT_SECRET_KEY: test-secret-key-for-ci-only-not-production
          ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS1mb3ItdGVzdGluZw==
