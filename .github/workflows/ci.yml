name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'

jobs:
  # ==================== SECURITY SCANNING ====================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install security tools
        run: |
          pip install safety bandit pip-audit

      - name: Run pip-audit (vulnerability scan)
        run: |
          pip install -r requirements.txt
          pip-audit --strict --desc || echo "::warning::Vulnerabilities found"
        continue-on-error: true

      - name: Run Bandit (static analysis)
        run: |
          bandit -r src/ -ll -ii -x tests/ --format json --output bandit-report.json || true
          bandit -r src/ -ll -ii -x tests/ --format txt

      - name: Check for hardcoded secrets
        run: |
          # Check for common secret patterns
          ! grep -rn --include="*.py" --include="*.ts" --include="*.tsx" \
            -E "(password|secret|api_key|token)\s*=\s*['\"][a-zA-Z0-9]{16,}" \
            src/ frontend/src/ 2>/dev/null || echo "No hardcoded secrets found"

      - name: Upload security report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-report
          path: bandit-report.json

  # ==================== PYTHON TESTS ====================
  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Create test directories
        run: |
          mkdir -p data logs

      - name: Run tests with coverage
        env:
          JWT_SECRET: test-secret-key-for-ci-pipeline-minimum-32-chars
          ENCRYPTION_MASTER_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS1mb3ItY2ktcGlwZWxpbmU=
          BITGET_API_KEY: test_api_key
          BITGET_API_SECRET: test_api_secret
          BITGET_PASSPHRASE: test_passphrase
        run: |
          python -m pytest tests/unit/ \
            --cov=src \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            -v \
            --tb=short \
            -x

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/

      - name: Coverage comment
        uses: py-cov-action/python-coverage-comment-action@v3
        if: github.event_name == 'pull_request'
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIMUM_GREEN: 80
          MINIMUM_ORANGE: 60

  # ==================== FRONTEND TESTS ====================
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check || npx tsc --noEmit

      - name: Lint
        run: npm run lint || echo "No lint script configured"

      - name: Build
        run: npm run build
        env:
          CI: true

  # ==================== DOCKER BUILD ====================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-python, security-scan]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: bitget-trading-bot:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'bitget-trading-bot:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

  # ==================== DEPLOY (main branch only) ====================
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test-python, test-frontend, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy notification
        run: |
          echo "Ready for deployment to production"
          echo "Manual deployment step - configure your DigitalOcean deployment here"
          # Example: SSH to server and pull latest
          # ssh ${{ secrets.DEPLOY_HOST }} "cd /app && docker-compose pull && docker-compose up -d"

      # Uncomment and configure for DigitalOcean App Platform
      # - name: Deploy to DigitalOcean
      #   uses: digitalocean/app_action@v1.1.5
      #   with:
      #     app_name: bitget-trading-bot
      #     token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
