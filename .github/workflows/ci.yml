name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_trading_bot
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - run: pip install pytest pytest-asyncio pytest-mock pytest-timeout

      - name: Run tests with SQLite
        run: python -m pytest tests/ -q --timeout=120
        env:
          CI: true
          ENVIRONMENT: test
          JWT_SECRET_KEY: test-secret-key-for-ci-only-not-production
          ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS1mb3ItdGVzdGluZw==
          DATABASE_URL: sqlite+aiosqlite:///test.db

      - name: Run tests with PostgreSQL
        run: python -m pytest tests/ -q --timeout=120
        env:
          CI: true
          ENVIRONMENT: test
          TEST_DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_trading_bot
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/test_trading_bot
          JWT_SECRET_KEY: test-secret-key-for-ci-only-not-for-production
          ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS1mb3ItdGVzdGluZw==
          DB_POOL_SIZE: 5
          DB_MAX_OVERFLOW: 10

  frontend-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci --legacy-peer-deps

      - run: npx vitest run

      - run: npx vite build

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install ruff

      - run: ruff check src/ tests/ --select E,W,F --ignore E501,E402,E731

  # ARCH-C4: verify every migration has a working upgrade() AND downgrade()
  # by running upgrade head -> downgrade base -> upgrade head against a real
  # Postgres 16. Catches missing/broken downgrade() before it hits production.
  alembic-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: tradingbot_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ci"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: alembic upgrade head
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://ci:ci@localhost:5432/tradingbot_ci
          ENVIRONMENT: test
          JWT_SECRET_KEY: test-secret-key-for-ci-only-not-production
          ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS1mb3ItdGVzdGluZw==

      - name: alembic downgrade base
        run: alembic downgrade base
        env:
          DATABASE_URL: postgresql+asyncpg://ci:ci@localhost:5432/tradingbot_ci
          ENVIRONMENT: test
          JWT_SECRET_KEY: test-secret-key-for-ci-only-not-production
          ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS1mb3ItdGVzdGluZw==

      - name: alembic upgrade head (re-apply)
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://ci:ci@localhost:5432/tradingbot_ci
          ENVIRONMENT: test
          JWT_SECRET_KEY: test-secret-key-for-ci-only-not-production
          ENCRYPTION_KEY: dGVzdC1lbmNyeXB0aW9uLWtleS1mb3ItdGVzdGluZw==
