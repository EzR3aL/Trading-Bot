# Bitget Trading Bot - Docker Compose Configuration
# Usage:
#   Build & Run: docker-compose up --build
#   Detached:    docker-compose up -d --build

services:
  trading-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bitget-trading-bot
    restart: unless-stopped

    env_file:
      - .env

    environment:
      - DASHBOARD_HOST=0.0.0.0
      - PYTHONUNBUFFERED=1

    ports:
      - "127.0.0.1:8080:8080"

    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1024M
        reservations:
          cpus: '0.5'
          memory: 256M
