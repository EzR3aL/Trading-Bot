# Trading Bot - Docker Compose Configuration
# Usage:
#   Build & Run: docker compose up --build -d
#   Logs:        docker compose logs -f
#   Stop:        docker compose down
#
# Production: Set POSTGRES_PASSWORD in .env to a strong random value.
# Local dev:  Works out of the box with defaults (DB on localhost only).

services:
  postgres:
    image: postgres:16-alpine
    container_name: tradingbot-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-tradingbot}
      - POSTGRES_USER=${POSTGRES_USER:-tradingbot}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-tradingbot_dev}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tradingbot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  trading-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bitget-trading-bot
    restart: unless-stopped

    env_file:
      - .env

    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://tradingbot:${POSTGRES_PASSWORD:-tradingbot_dev}@postgres:5432/tradingbot}

    ports:
      - "127.0.0.1:8000:8000"

    volumes:
      - ./data:/app/data
      - ./logs:/app/logs

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

    depends_on:
      postgres:
        condition: service_healthy

    deploy:
      resources:
        limits:
          memory: 1024M

  prometheus:
    image: prom/prometheus:latest
    container_name: tradingbot-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      trading-bot:
        condition: service_healthy

  grafana:
    image: grafana/grafana:latest
    container_name: tradingbot-grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD:-changeme}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:
