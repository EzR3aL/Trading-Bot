[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = -v --tb=short
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:coroutine '_store_audit_record_safe' was never awaited:RuntimeWarning
markers =
    asyncio: mark test as async
    slow: mark test as slow running
    integration: mark test as integration test
    exchange: mark test as exchange-specific
    e2e: mark test as end-to-end test
    bitget_live: live tests against Bitget Demo API (requires BITGET_LIVE_TEST_USER_ID env var)
    bingx_live: live tests against BingX VST Demo API (requires BINGX_LIVE_TEST_USER_ID env var)
